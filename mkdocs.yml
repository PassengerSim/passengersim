site_name: PassengerSim
site_url: 'https://www.passengersim.com/'
theme:
  name: material
  custom_dir: docs/.overrides
  logo: assets/logo.svg
  favicon: assets/favicon.png
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    # - navigation.indexes # not compatible with toc.integrate
    - navigation.prune
    - toc.integrate

# If we want versioning for the docs, we can use mike to manage it.
#
#    extra:
#      version:
#        provider: mike

extra_css:
  - stylesheets/extra.css

plugins:
  - offline
  - autorefs
  - mkdocs-jupyter:
      include: ["*.nbconvert.ipynb"]
      execute: false
      remove_tag_config:
        remove_input_tags:
          - hidden
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            docstring_style: numpy
            allow_inspection: false
            docstring_section_style: list
            show_if_no_docstring: true
            load_external_modules: false
            preload_modules:
              - passengersim_core
  - search
  - exclude-search:
      exclude:
        - colab/*
  - gen-files:
      scripts:
      - docs/.scripts/_generate_ref_pages.py

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - footnotes

repo_url: https://github.com/PassengerSim/passengersim
repo_name: PassengerSim/passengersim

extra_javascript:
  - javascript/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

