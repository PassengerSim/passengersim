#
# 3 market example that I'm using to test new features
#

scenario: AW_test

simulation_controls:
  num_trials: 5
  num_samples: 600
  burn_samples: 50
  random_seed: 42
  sys_k_factor: 0.1
  mkt_k_factor: 0.15
  pax_type_k_factor: 0.2
  simple_k_factor: 0.2
  tf_k_factor: 0.1
  tf_z_factor: 2.0
  prorate_revenue: true
  max_connect_time: 120
#  disable_ap: False
#  disable_ap: False
  demand_multiplier: 1.0
  capacity_multiplier: 1.0
  manual_paths: false
  debug_offers: false
  timeframe_demand_allocation: pods
  capture_choice_set_file: choice-set-junk3.csv
  capture_choice_set_obs: 10000
  # Mountain Standard Time (for me)
  controller_time_zone: 0  # -7
  generate_3seg: True
  debug_connections: False
  debug_choice: False
  show_progress_bar: True

db:
  write_items:
    - leg
    - fare
    - demand
    - bookings
    - bucket
#    - pathclass
    - leg_final
    - fare_final
    - demand_final
#    - edgar
  fast: true
  engine: sqlite
#  filename: "AW-3MKT.sqlite"
  filename: ":memory:"

outputs:
  reports:
#    - leg_forecasts
    - fare_class_mix
    - load_factors
    - bookings_by_timeframe
    - total_demand
    - demand_to_come
    - carrier_history2
#    - carrier_history
#    - edgar
    - forecast_accuracy

