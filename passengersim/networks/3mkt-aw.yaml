load_factor_curves:
  - name: lf_curve1
    algorithm: lf_target
    min_accordion: 1.2
    max_accordion: 1.8
    target_load_factor: 0.8
    convergence_constant: 0.75
    curve:
      Y0: 1.0
      Y1: 0.9
      Y2: 0.8
      Y3: 0.7
      Y4: 0.6
      Y5: 0.5

rm_systems:
  rm_fcfs:
    availability_control: leg
    processes: {}
  rm_lf:
    availability_control: leg
    processes:
      DAILY:
        - step_type: lfthreshold
          name: optimization
          algorithm: lf_target
          kind: leg
      DCP:
        - step_type: lfthreshold
          name: optimization
          algorithm: lf_target
          kind: leg
  rm_no_detruncation:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: none
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: leg
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg

  rm_leg:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          initialization_method: pods
          minimum_mu: 0.01
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: leg
        - step_type: emsr
          name: leg_optimization
          algorithm: emsrb
          kind: leg

  rm_leg_cabin:
    availability_control: cabin
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: leg
        - step_type: cabin
          name: leg_optimization
          algorithm: emsrb
          kind: leg

  rm_test1:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          minimum_mu: 0.01
          initialization_method: pods
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: leg
#        - step_type: errors
#          bias: 0.05
#          k_factor: 0.2
        - step_type: emsr
          name: leg_optimization
          algorithm: emsrb
          kind: leg
        - step_type: emsr
          name: estimate_bp
          algorithm: emsrc
          kind: leg
        - step_type: useradjustment
          name: user_adjustment
          algorithm: booked_lf2
      DEPARTURE:
        - step_type: marketaction
          name: fare_sale
          start_sample: 250
          end_sample: 350
          orig_airport: BOS
          dest_airport: LAX
          fare_change_pct: -10.0
          fare_classes: ["Y3", "Y4", "Y5"]

  rm_test_elasticity:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          minimum_mu: 0.01
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: leg
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg
      DEPARTURE:
        - step_type: elasticity
          name: elasticity
          algorithm: loglog
          kind: leg

  rm_emsrg:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          minimum_mu: 0.01
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: leg
        - step_type: emsr
          name: optimization
          algorithm: emsrg
          kind: leg

  rm_mfem:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: mfem
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: leg
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg

  rm_davn:
    availability_control: vn
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: path
        - step_type: probp
          name: displacement
        - step_type: aggregation
          name: aggregate
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: probp
          name: displacement
        - step_type: aggregation
          name: aggregate
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg

  rm_udp:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: path
          initialization_method: pods
          minimum_mu: 0.01
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          kind: path
        - step_type: udp
          name: optimization
          arrivals_per_time_slice: 1.0
          min_time_slices_per_dcp: 1
        - step_type: aggregation  # not needed for algorithm, but gives leg forecast data for output
          name: aggregate
      DAILY:
        - step_type: udpupdate
          name: optimization

  rm_pro_bp:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          minimum_mu: 0.01
          initialization_method: pods
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: path
        - step_type: probp
          name: optimization
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: probp
          name: optimization

  rm_bid_price2:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: path
        - step_type: probp
          name: optimization
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: probp
          name: optimization

  rm_sub_bp:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          minimum_mu: 0.01
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: path
        - step_type: subbp
          name: optimization
          bid_price_vector: true
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: subbp
          name: optimization
          bid_price_vector: true

  rm_lp:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          minimum_mu: 0.01
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: path
        - step_type: lp
          name: optimization
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: lp
          name: optimization

  rm_hybrid:
    availability_control: leg
    processes:
      DCP:
        - step_type: forecast
          name: hybrid_forecast
          algorithm: additive_pickup
          alpha: 0.15
          # max_cap: 10.0
          kind: hybrid
        - step_type: aggregation
          name: aggregate
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg
#      DEPARTURE:
#        - step_type: elasticity
#          name: elasticity
#          algorithm: loglog
#          kind: leg

  rm_hybrid_mr:
    availability_control: leg
    processes:
      DCP:
        - step_type: forecast
          name: hybrid_forecast
          algorithm: additive_pickup
          # max_cap: 10.0
          kind: hybrid
        - step_type: fareadjustment
          name: aggregate
          algorithm: mr
          kind: path
          frat5: curve_C
        - step_type: aggregation
          name: aggregate
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg

  rm_adaptive_hybrid:
    availability_control: leg
    processes:
      DCP:
        - step_type: forecast
          name: hybrid_forecast
          algorithm: exp_smoothing
          alpha: 0.15
          # max_cap: 10.0
          kind: hybrid
        - step_type: aggregation
          name: aggregate
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg
      DEPARTURE:
        - step_type: elasticity
          name: elasticity
          algorithm: loglog
          kind: leg
          min_r: 0.5
          alpha: 0.03
          smoothing_function: tanh

  rm_fare_adj_leg:
    availability_control: leg
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: additive_pickup
          alpha: 0.15
          kind: hybrid
        - step_type: fareadjustment
          name: aggregate
          algorithm: mr
          kind: path
          frat5: curve_C
        - step_type: aggregation
          name: aggregate
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg

  rm_fare_adj_bp:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: path
        - step_type: fareadjustment
          name: adj
          algorithm: mr
          kind: path
          frat5: curve_C
        - step_type: probp
          name: optimization
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: fareadjustment
          name: adj
          algorithm: mr
          kind: path
          frat5: curve_C
        - step_type: probp
          name: optimization
      DEPARTURE:
        - step_type: elasticity
          name: elasticity
          algorithm: loglog
          kind: leg

  rm_subgradient:
    availability_control: bp
    processes:
      DCP:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: path
        - step_type: forecast
          name: path_forecast
          algorithm: exp_smoothing
          alpha: 0.15
          kind: path
        - step_type: subgradient
          name: optimization
          kind: path
          max_iter: 100
          step_size: 0.3
          max_viol: 0.5
          min_lambda: 100.0
          use_gamma: False
      DAILY:
        - step_type: forecastadjustment
          name: adjust
          algorithm: timeframe
          kind: path
        - step_type: subgradient
          name: optimization
          kind: path
          max_iter: 100
          step_size: 0.3
          max_viol: 0.5
          min_lambda: 100.0
          use_gamma: False

