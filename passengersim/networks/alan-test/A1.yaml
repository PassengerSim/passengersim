scenario: A1 - Mucking around with Calibration
simulation_controls:
  # random_seed: 42
  num_trials: 3
  num_samples: 500
  sys_k_factor: 0.1
  mkt_k_factor: 0.2
  pax_type_k_factor: 0.4
  simple_k_factor: 0.2
  tf_k_factor: 0.1
  tf_z_factor: 2.0
  prorate_revenue: true
  timeframe_demand_allocation: pods
  max_connect_time: 240
  disable_ap: false
  capacity_multiplier: 1.6
  demand_multiplier: 1.0
  manual_paths: false
  # debug_connections: true
  debug_choice: false

rm_systems:
  - name: rm_leg
    availability_control: leg
    processes:
      dcp:
        - step_type: untruncation
          name: untruncation
          algorithm: em
          kind: leg
        - step_type: forecast
          name: forecast
          algorithm: additive_pickup
          alpha: 0.1
          kind: leg
        - step_type: emsr
          name: optimization
          algorithm: emsrb
          kind: leg

choice_models:
  business:
    kind: pods
    emult: 1.6
    basefare_mult: 2.5
    path_quality:  [38.30,  0.10]
#    preferred_airline:  [-12.29,  0.17]
    r1: 2.0
    r2: 0.35
    r3: 0.50
    anc1_relevance: 0.8
    anc2_relevance: 0.5
    anc3_relevance: 0.8
  #    todd_curve: business

  leisure:
    kind: pods
    emult: 1.5
    basefare_mult: 1.0
    path_quality:  [2.02, 0.12]
#    preferred_airline:  [-1.98, 0.11]
#    hhi: [0.0, 0.0001]
    r1: 0.70
    r2: 0.35
    r3: 0.35
    anc1_relevance: 0.5
    anc2_relevance: 0.8
    anc3_relevance: 0.5
    elapsed_time: [0, 0.7]
    buffer_threshold: 25
    buffer_time: [0, 0.1]
#    todd_curve: leisure

